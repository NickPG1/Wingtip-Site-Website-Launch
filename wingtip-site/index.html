<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wingtip — Luckyman</title>
  <meta name="description" content="Luckyman — the new album from Wingtip. Out now.">
  <meta property="og:title" content="Wingtip — Luckyman">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.wingtipmusic.com">
  <meta property="og:image" content="https://is1-ssl.mzstatic.com/image/thumb/Music211/v4/9f/3e/09/9f3e0989-9632-b2ee-86b0-99cbfe420b48/067003178259.png/1200x1200bb.jpg">
  <meta property="og:description" content="Luckyman — the new album from Wingtip. Out now on all platforms.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    /* ───────────────────────────────────────
       RESET
    ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Pulled from the Luckyman cover art */
      --bg:       #0b2a2a;          /* deep teal from the water */
      --bg-grad:  #061e1e;          /* darker teal for gradient */
      --gold:     #d4c476;          /* the title text color */
      --pink:     #e8849a;          /* from the car */
      --cream:    #f0ece2;          /* light text */
      --muted:    rgba(240,236,226,0.5);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    /* ───────────────────────────────────────
       FULL-SCREEN HERO
    ─────────────────────────────────────── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 1.5rem;
      min-height: 100vh;
      position: relative;

      /* Subtle radial glow behind the artwork */
      background:
        radial-gradient(ellipse at 50% 45%, rgba(212,196,118,0.08) 0%, transparent 60%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-grad) 100%);
    }

    /* ─── Artist name (top) ─── */
    .artist-name {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    /* ─── Album artwork ─── */
    .album-art {
      width: min(340px, 75vw);
      height: min(340px, 75vw);
      border-radius: 8px;
      overflow: hidden;
      box-shadow:
        0 8px 40px rgba(0,0,0,0.5),
        0 0 80px rgba(212,196,118,0.06);
      margin-bottom: 2rem;
      transition: transform 0.4s ease;
    }

    .album-art:hover {
      transform: scale(1.02);
    }

    .album-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ─── Album title + subtitle ─── */
    .album-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.3rem;
    }

    .album-subtitle {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 2.5rem;
    }

    /* ─── Three buttons ─── */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: min(320px, 85vw);
    }

    .action-btn {
      display: block;
      padding: 0.9rem 1.5rem;
      border: 1px solid rgba(240,236,226,0.2);
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
      color: var(--cream);
      background: rgba(240,236,226,0.04);
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .action-btn:hover {
      background: rgba(240,236,226,0.1);
      border-color: rgba(240,236,226,0.4);
    }

    /* Highlight the primary CTA (Stream) */
    .action-btn--primary {
      background: var(--cream);
      color: var(--bg);
      border-color: var(--cream);
    }

    .action-btn--primary:hover {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--bg-grad);
    }

    /* ─── Social links ─── */
    .socials {
      display: flex;
      gap: 1.25rem;
      margin-top: 2.5rem;
    }

    .socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(240,236,226,0.15);
      transition: border-color 0.2s, background 0.2s;
    }

    .socials a:hover {
      border-color: rgba(240,236,226,0.4);
      background: rgba(240,236,226,0.06);
    }

    .socials svg {
      width: 14px;
      height: 14px;
      fill: var(--cream);
      opacity: 0.7;
    }

    .socials a:hover svg { opacity: 1; }

    /* ─── Footer ─── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ───────────────────────────────────────
       MERCH PAGE (kept from previous build)
       Loads when navigating to #merch or /merch
    ─────────────────────────────────────── */

    /* ─── Responsive polish ─── */
    @media (min-width: 640px) {
      .actions {
        flex-direction: row;
        width: auto;
        gap: 1rem;
      }
      .action-btn {
        padding: 0.9rem 2.5rem;
      }
    }

    @media (max-height: 700px) {
      .album-art {
        width: min(240px, 60vw);
        height: min(240px, 60vw);
      }
    }
  </style>
</head>
