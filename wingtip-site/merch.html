<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merch — Wingtip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b2a2a; --bg-grad: #061e1e; --gold: #d4c476;
      --pink: #e8849a; --cream: #f0ece2; --muted: rgba(240,236,226,0.5);
      --surface: rgba(240,236,226,0.04); --border: rgba(240,236,226,0.12);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg-grad) 100%);
      color: var(--cream);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--cream); text-decoration: none; }

    /* Nav */
    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.25rem 2rem;
    }
    .back { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); transition: color 0.2s; }
    .back:hover { color: var(--cream); }
    .nav-title { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); }

    /* Page */
    .page { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
    .page-title {
      font-size: 0.8rem; font-weight: 500; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--gold); text-align: center; margin-bottom: 2.5rem;
    }

    /* Merch grid */
    .merch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.25rem; }
    .merch-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; transition: border-color 0.2s;
    }
    .merch-card:hover { border-color: rgba(240,236,226,0.25); }
    .merch-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: rgba(0,0,0,0.2); display: block; }
    .merch-info { padding: 1.25rem; }
    .merch-info h3 { font-size: 0.9rem; font-weight: 500; margin-bottom: 0.25rem; }
    .merch-info .price { color: var(--muted); font-size: 0.8rem; margin-bottom: 1rem; }
    .merch-info select {
      width: 100%; padding: 0.5rem; margin-bottom: 0.75rem;
      background: var(--bg); color: var(--cream); border: 1px solid var(--border);
      border-radius: 6px; font-size: 0.8rem; font-family: inherit;
    }
    .buy-btn {
      display: block; width: 100%; padding: 0.7rem; border: 1px solid var(--border);
      border-radius: 6px; background: var(--surface); color: var(--cream);
      font-family: inherit; font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.15em; text-transform: uppercase; text-align: center;
      cursor: pointer; transition: all 0.2s;
    }
    .buy-btn:hover { background: var(--cream); color: var(--bg); border-color: var(--cream); }
  </style>
</head>
<body>

  <nav>
    <a class="back" href="/">&larr; Back</a>
    <span class="nav-title">Wingtip</span>
  </nav>

  <div class="page">
    <h1 class="page-title">Merch</h1>

    <div class="merch-grid">
      <!-- ITEM 1 — duplicate/edit these blocks for each product -->
      <div class="merch-card">
        <img class="merch-img" src="images/merch-tee-black.jpg" alt="Luckyman Vinyl" onerror="this.style.background='rgba(0,0,0,0.3)'">
        <div class="merch-info">
          <h3>Luckyman Vinyl</h3>
          <p class="price">$30</p>
          <select class="size-select">
            <option value="">Select size</option>
            <option>S</option><option>M</option><option>L</option><option>XL</option>
          </select>
          <button class="buy-btn" data-price-id="price_1TbP5BLmaEryYifd5PM1hEbT">Buy Now</button>
        </div>
      </div>

      <!-- ITEM 2 -->
      <div class="merch-card">
        <img class="merch-img" src="images/merch-hoodie-cream.jpg" alt="All I Got Tee" onerror="this.style.background='rgba(0,0,0,0.3)'">
        <div class="merch-info">
          <h3>All I Got Tee</h3>
          <p class="price">$55</p>
          <select class="size-select">
            <option value="">Select size</option>
            <option>S</option><option>M</option><option>L</option><option>XL</option>
          </select>
          <button class="buy-btn" data-price-id="price_1TbP5iLmaEryYifdgvXP56t7">Buy Now</button>
        </div>
      </div>

      <!-- ITEM 3 -->
      <div class="merch-card">
        <img class="merch-img" src="images/merch-hat.jpg" alt="Wingtip Hat" onerror="this.style.background='rgba(0,0,0,0.3)'">
        <div class="merch-info">
          <h3>Wingtip Dad Hat</h3>
          <p class="price">$25</p>
          <button class="buy-btn" data-price-id="price_1TbP6OLmaEryYifdrpaJuzYh">Buy Now</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Stripe Checkout Script (same as before) -->
  <script>
    document.querySelectorAll('.buy-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const priceId = btn.dataset.priceId;
        const sizeSelect = btn.closest('.merch-info').querySelector('.size-select');
        const size = sizeSelect ? sizeSelect.value : null;
        if (sizeSelect && !size) { sizeSelect.style.borderColor = '#e74c3c'; sizeSelect.focus(); return; }
        btn.textContent = 'Loading...'; btn.disabled = true;
        try {
          const res = await fetch('/.netlify/functions/create-checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ priceId, size, quantity: 1 })
          });
          const data = await res.json();
          if (data.url) { window.location.href = data.url; }
          else { throw new Error(data.error || 'Checkout failed'); }
        } catch (err) {
          alert('Something went wrong. Please try again.');
          btn.textContent = 'Buy Now'; btn.disabled = false;
        }
      });
    });
  </script>

</body>
</html>
